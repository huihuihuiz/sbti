<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBTI 抽象人格专业档案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --paper:#f0f2f5; --ink:#000; --muted:#666; --accent:#ff3300; --border:#ddd;
  --serif:'DM Serif Display', serif; --sans:'DM Sans', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{
  background:var(--paper); color:var(--ink); font-family:var(--sans);
  min-height:100vh; overflow-x:hidden;
}
#app{ width:100%; max-width:500px; margin:0 auto; padding:2rem 1.25rem 4rem; position:relative; }
.screen{display:none; animation:slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;}
.screen.active{display:block}
@keyframes slideUp{ from{opacity:0; transform:translateY(30px)} to{opacity:1; transform:translateY(0)} }

/* START */
.s-header{text-align:center; padding:3rem 0;}
.logo{font-family:var(--serif); font-size:6rem; line-height:0.8; letter-spacing:-5px; position:relative; display:inline-block;}
.logo::after{content:'Premium'; position:absolute; top:0; right:-20px; font-size:10px; font-family:var(--sans); letter-spacing:1px; background:var(--ink); color:#fff; padding:2px 5px; text-transform:uppercase;}
.s-sub{font-size:12px; letter-spacing:5px; text-transform:uppercase; color:var(--muted); margin-top:1.5rem; font-weight:600;}
.s-tagline{font-size:18px; line-height:1.6; color:var(--ink); margin:2rem 0; text-align:center; font-weight:500;}
.s-desc{font-size:13px; color:var(--muted); line-height:1.8; text-align:center; margin-bottom:3rem;}

.btn-black{
  display:block; width:100%; padding:20px; background:var(--ink); color:#fff; border:none;
  border-radius:0; font-family:var(--sans); font-size:16px; font-weight:600; cursor:pointer; letter-spacing:2px;
  box-shadow: 10px 10px 0 rgba(0,0,0,0.1); transition: transform 0.2s;
}
.btn-black:active{transform: translate(2px, 2px); box-shadow: 8px 8px 0 rgba(0,0,0,0.1);}

/* TEST */
.prog-box{margin-bottom:3rem;}
.prog-info{display:flex; justify-content:space-between; font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:8px;}
.prog-track{height:1px; background:var(--border);}
.prog-fill{height:1px; background:var(--ink); transition:width 0.4s;}
.q-title{font-family:var(--serif); font-size:1.8rem; line-height:1.2; margin-bottom:2.5rem; letter-spacing:-1px;}
.opts{display:flex; flex-direction:column; gap:12px;}
.opt{
  padding:18px; border:1px solid var(--ink); background:#fff; text-align:left; font-size:15px;
  cursor:pointer; font-weight:500; transition: background 0.2s;
}
.opt:active{background:var(--ink); color:#fff;}

/* LOADER */
.loader-wrap{text-align:center; padding:8rem 0;}
.noise{font-family:var(--serif); font-size:2rem; margin-bottom:1rem; overflow:hidden; white-space:nowrap;}
.loader-msg{font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;}

/* RESULT */
.r-type{font-family:var(--serif); font-size:7rem; line-height:1; letter-spacing:-6px; text-align:center; margin-bottom:1rem;}
.r-name{font-size:24px; font-weight:700; text-align:center; margin-bottom:2rem; border-bottom:2px solid var(--ink); display:inline-block; width:100%; padding-bottom:1rem;}

.r-block{margin-bottom:2.5rem; background:#fff; border:1px solid var(--border); padding:1.5rem;}
.r-label{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:1rem; display:block;}
.r-content{font-size:14px; line-height:1.8; color:#333;}
.r-content b{color:var(--ink); font-weight:800; font-style:italic;}

.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:2.5rem;}
.stat-box{border:1px solid var(--ink); padding:12px; background:#fff;}
.stat-l{font-size:9px; font-weight:700; color:var(--muted); margin-bottom:5px;}
.stat-v{font-size:18px; font-weight:900;}

.btn-outline{
  display:block; width:100%; padding:18px; background:transparent; border:1px solid var(--ink);
  color:var(--ink); margin-top:12px; font-size:14px; text-transform:uppercase; letter-spacing:1px; cursor:pointer;
}

#toast{position:fixed; bottom:30px; left:20px; right:20px; background:var(--ink); color:#fff; padding:15px; font-size:11px; text-transform:uppercase; letter-spacing:1px; opacity:0; transition:opacity 0.3s;}

/* Export */
#export-container{position:absolute; left:-9999px;}
.exp-card{ width:480px; padding:60px; background:#f0f2f5; color:#000; font-family:'DM Sans', sans-serif; border:10px solid #000; }
.exp-logo{font-family:'DM Serif Display', serif; font-size:120px; line-height:0.8; letter-spacing:-10px;}
.exp-res{font-size:48px; font-weight:800; margin-top:20px; border-bottom:2px solid #000; padding-bottom:10px;}
</style>
</head>
<body>
<div id="app">
  <!-- START -->
  <div id="ss" class="screen active">
    <div class="s-header">
      <div class="logo">SBTI</div>
      <div class="s-sub">Abstract Entropy Calibration</div>
    </div>
    <p class="s-tagline">MBTI 是人类的妥协，SBTI 是抽象的终点。</p>
    <p class="s-desc">这不仅是一次测试，这是一次对你灵魂高频波段的强制解压缩。通过 40 个非线性维度，我们将把你从碳基生命的常识中剥离。</p>
    <button class="btn-black" onclick="start()">开始高熵校准 →</button>
  </div>

  <!-- TEST -->
  <div id="sq" class="screen">
    <div class="prog-box">
      <div class="prog-info"><span id="qc">1 / 40</span><span>Entropy Scan</span></div>
      <div class="prog-track"><div id="pf" class="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="q-title" id="qt"></div>
    <div class="opts" id="qo"></div>
  </div>

  <!-- LOADING -->
  <div id="sl" class="screen">
    <div class="loader-wrap">
      <div class="noise" id="noise">####################</div>
      <div class="loader-msg" id="lm">正在坍缩波函数...</div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="sr" class="screen">
    <div class="r-type" id="rt"></div>
    <div class="r-name" id="rn"></div>

    <div class="stats-grid" id="sg"></div>

    <div class="r-block">
      <span class="r-label">高维肖像解读</span>
      <p class="r-content" id="rd"></p>
    </div>

    <div class="r-block">
      <span class="r-label">宇宙坐标定位</span>
      <p class="r-content" id="rl"></p>
    </div>

    <div class="r-block">
      <span class="r-label">稳定性指数预测</span>
      <div class="r-content" id="rs"></div>
    </div>

    <button class="btn-black" onclick="exportCard()">获取高熵档案卡 📸</button>
    <button class="btn-outline" onclick="location.href='index.html'">返回现实世界</button>
  </div>
</div>

<div id="toast">SYSTEM: PROCESSING...</div>
<div id="export-container"></div>

let sc={A:0,B:0,C:0,D:0}, cur=0;

function start(){cur=0; sc={A:0,B:0,C:0,D:0}; show("sq"); render();}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function render(){
  const q=Q[cur];
  document.getElementById('pf').style.width=(cur/Q.length*100)+'%';
  document.getElementById('qc').textContent=(cur+1)+' / '+Q.length;
  document.getElementById('qt').textContent=q.t;
  const el=document.getElementById('qo'); el.innerHTML='';
  q.o.forEach(o=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=o.t;
    b.onclick=()=>{ Object.keys(o.s).forEach(k=>sc[k]+=o.s[k]); cur++; cur<Q.length?render():finish(); };
    el.appendChild(b);
  });
}

function finish(){
  show("sl");
  const msgs = ["正在注入随机噪声...","正在校准灵魂位移...","解析用户抽象频率...","正在坍锁至最终人格..."];
  let i=0;
  const timer = setInterval(()=>{
    document.getElementById('lm').textContent = msgs[i++];
    document.getElementById('noise').textContent = Math.random().toString(16).substring(2);
    if(i>=msgs.length){ clearInterval(timer); setTimeout(showResult, 800); }
  }, 700);
}

function showResult(){
  const sorted = Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const k = sorted[0][0];
  const keys = {A:'ISTB', B:'ANOP', C:'VOPC', D:'ENTX'};
  const res = DATA[keys[k]];

  document.getElementById('rt').textContent = keys[k];
  document.getElementById('rn').textContent = res.t;
  document.getElementById('rd').innerHTML = res.d;
  document.getElementById('rl').textContent = res.l;
  document.getElementById('rs').textContent = res.s;

  const labels = {A:'逻辑硬度', B:'观测广度', C:'情感频宽', D:'混沌系数'};
  const sg = document.getElementById('sg'); sg.innerHTML='';
  sorted.forEach(([kk,vv])=>{
    sg.innerHTML += `<div class="stat-box"><div class="stat-l">${labels[kk]}</div><div class="stat-v">${vv*2}%</div></div>`;
  });

  show("sr");
}

function toast(m){
  const t=document.getElementById('toast'); t.textContent=m; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0', 3000);
}

function exportCard(){
  const sorted = Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const k = sorted[0][0];
  const keys = {A:'ISTB', B:'ANOP', C:'VOPC', D:'ENTX'};
  const res = DATA[keys[k]];
  
  const container=document.getElementById('export-container');
  container.innerHTML=`<div class="exp-card" id="card">
    <div style="font-size:12px; letter-spacing:4px; font-weight:700; border-bottom:1px solid #000; padding-bottom:15px; margin-bottom:40px;">SBTI ABSTRACT RECORD · PREV-882</div>
    <div class="exp-logo">${keys[k]}</div>
    <div class="exp-res">${res.t}</div>
    <p style="font-size:16px; line-height:1.7; margin-top:40px; border-left:4px solid #000; padding-left:20px;">“${res.d.replace(/<[^>]*>/g, '').substring(0, 150)}”</p>
    <div style="margin-top:60px; font-size:10px; color:#666; display:flex; justify-content:space-between;">
      <span>© 2026 DISCOVERY HUB</span>
      <span>ENTROPY: VERIFIED</span>
    </div>
  </div>`;
  
  toast('SYSTEM: DECOMPRESSING SOUL DATA...');
  setTimeout(()=>{
    html2canvas(document.getElementById('card'),{scale:2,backgroundColor:'#f0f2f5'}).then(canvas=>{
      const link=document.createElement('a'); link.download=`SBTI_Archive_${keys[k]}.png`;
      link.href=canvas.toDataURL(); link.click();
      toast('SYSTEM: EXPORT SUCCESS');
    });
  },200);
}
