<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PBTI 摄影师人格专业报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --ink:#0e0e0e; --paper:#f7f4ee; --grain:#ede9e0; --accent:#c8a96e; --accent-dark:#9a7a45;
  --muted:#8a8478; --border:#d8d2c5; --card:#fffefb;
  --serif:'DM Serif Display', Georgia, serif; --sans:'DM Sans', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{
  background:var(--paper); color:var(--ink); font-family:var(--sans);
  min-height:100vh; background-image: radial-gradient(ellipse 60% 50% at 15% 85%,rgba(200,169,110,.05) 0%,transparent 70%);
}
#app{ width:100%; max-width:500px; margin:0 auto; padding:0 1.25rem 4rem; }
.screen{display:none; animation:fu .38s ease both}
.screen.active{display:block}
@keyframes fu{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}

/* START */
.s-top{padding:3rem 0 0; text-align:center;}
.logo{font-family:var(--serif); font-size:4.5rem; letter-spacing:-3px; line-height:1; display:block;}
.logo-sub{font-size:11px; font-weight:300; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-top:6px;}
.filmstrip{display:flex; gap:3px; justify-content:center; margin:1.5rem 0 1.25rem;}
.fr{flex:1; max-width:48px; height:34px; background:var(--ink); border-radius:2px; position:relative;}
.fr::before,.fr::after{content:''; position:absolute; left:50%; transform:translateX(-50%); width:6px; height:5px; background:var(--paper); border-radius:1px;}
.fr::before{top:2px}.fr::after{bottom:2px}
.fr:nth-child(4){opacity:1} .fr{opacity:0.3}

.s-tagline{font-family:var(--serif); font-style:italic; font-size:24px; color:var(--ink); line-height:1.4; margin-bottom:1rem; text-align:center;}
.s-desc{font-size:14px; font-weight:300; color:var(--muted); line-height:1.8; margin-bottom:2rem; text-align:center;}
.btn-main{
  display:block; width:100%; padding:18px; background:var(--ink); color:var(--paper); border:none;
  border-radius:10px; font-family:var(--sans); font-size:16px; font-weight:500; cursor:pointer; letter-spacing:0.5px;
}
.btn-main:active{transform:scale(0.98);}

/* TEST */
.prog-wrap{padding:2rem 0 1rem;}
.prog-top{display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;}
.prog-track{height:2px; background:var(--border); border-radius:1px; overflow:hidden;}
.prog-fill{height:100%; background:var(--accent-dark); transition:width 0.4s ease;}
.q-cat{display:inline-block; font-size:10px; font-weight:500; letter-spacing:2px; color:var(--accent-dark); background:rgba(200,169,110,0.1); padding:4px 12px; border-radius:99px; margin-bottom:1rem; border:1px solid rgba(200,169,110,0.2);}
.q-text{font-family:var(--serif); font-size:1.6rem; color:var(--ink); line-height:1.45; margin-bottom:2rem;}
.opts{display:flex; flex-direction:column; gap:10px;}
.opt{padding:16px 20px; border:1px solid var(--border); border-radius:10px; background:var(--card); font-size:15px; cursor:pointer; text-align:left; line-height:1.5; color:#333; font-weight:300;}
.opt:active{border-color:var(--accent); background:rgba(200,169,110,0.05);}

/* LOADER */
.loader-box{text-align:center; padding:5rem 0;}
.spinner{width:40px; height:40px; border:1px solid var(--border); border-top-color:var(--ink); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1.5rem;}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT */
.r-hero{padding:2rem 0; text-align:center; border-bottom:1px solid var(--border); margin-bottom:2rem;}
.r-icon{font-size:3rem; display:block; margin-bottom:0.75rem;}
.r-eng{font-family:var(--serif); font-size:3.5rem; letter-spacing:-2px; line-height:1; margin-bottom:0.5rem;}
.r-zh{font-size:22px; font-weight:600; color:var(--accent-dark); margin-bottom:0.75rem;}
.r-pill{display:inline-block; padding:5px 16px; background:var(--ink); color:var(--paper); border-radius:99px; font-size:11px; letter-spacing:1px;}

.r-sec{margin-bottom:2.5rem;}
.r-sec-h{font-size:10px; font-weight:600; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:1rem; display:flex; align-items:center; gap:10px;}
.r-sec-h::after{content:''; flex:1; height:1px; background:var(--border);}
.r-card{background:var(--card); border:1px solid var(--border); padding:1.5rem; border-radius:12px;}
.r-text{font-size:15px; font-weight:300; line-height:1.8; color:#333;}
.r-text b{color:var(--ink); font-weight:600;}

.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.stat-i{background:var(--grain); border-radius:8px; padding:12px;}
.stat-l{font-size:9px; color:var(--muted); font-weight:600; text-transform:uppercase; margin-bottom:5px;}
.stat-v{font-size:16px; font-weight:500; color:var(--ink);}

.share-toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 24px; border-radius:30px; font-size:12px; opacity:0; transition:opacity 0.3s; z-index:1000;}

/* Export Styling */
#export-container{position:absolute; left:-9999px; top:0;}
.exp-card{ width:450px; padding:50px 40px; background:#f7f4ee; color:#0e0e0e; font-family:'DM Sans', sans-serif; border:1px solid #d8d2c5;}
.exp-logo{font-family:'DM Serif Display', serif; font-size:64px; border-bottom:2px solid #0e0e0e; padding-bottom:15px; margin-bottom:30px;}
.exp-res{font-family:'DM Serif Display', serif; font-size:48px; margin-bottom:5px;}
.exp-desc{font-size:16px; line-height:1.7; font-style:italic; margin:30px 0; font-family:'DM Serif Display', serif;}
</style>
</head>
<body>
<div id="app">
  <!-- START -->
  <div id="ss" class="screen active">
    <div class="s-top">
      <span class="logo">PBTI</span>
      <div class="logo-sub">Photographer Archetype Study</div>
    </div>
    <div class="filmstrip">
      <div class="fr"></div><div class="fr"></div><div class="fr" style="opacity:1"></div><div class="fr"></div>
    </div>
    <p class="s-tagline">快门落下的瞬间，灵魂便已定影</p>
    <p class="s-desc">
      这不是关于器材的闲聊，而是关于视觉心理的深度剖析。40 道专业测评题，揭开你作为创作者的底层代码。
    </p>
    <button class="btn-main" onclick="start()">开启专业测评 →</button>
  </div>

  <!-- TEST -->
  <div id="sq" class="screen">
    <div class="prog-wrap">
      <div class="prog-top"><span id="qc">1 / 40</span><span id="q-cat">Vision Analysis</span></div>
      <div class="prog-track"><div id="pf" class="prog-fill" style="width:0%"></div></div>
    </div>
    <span class="q-cat" id="q-dim"></span>
    <div class="q-text" id="qt"></div>
    <div class="opts" id="qo"></div>
  </div>

  <!-- LOADER -->
  <div id="sl" class="screen">
    <div class="loader-box">
      <div class="spinner"></div>
      <div style="font-family:var(--serif); font-size:1.4rem;">解析视觉指纹...</div>
      <div id="ls" style="font-size:12px; color:var(--muted); margin-top:1rem;">正在分析色彩心理倾向</div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="sr" class="screen">
    <div class="r-hero">
      <span class="r-icon" id="ri"></span>
      <div class="r-eng" id="re"></div>
      <div class="r-zh" id="rz"></div>
      <span class="r-pill" id="rp"></span>
    </div>

    <div class="r-sec">
      <div class="r-sec-h">人格特征</div>
      <div class="r-card"><p class="r-text" id="rd"></p></div>
    </div>

    <div class="r-sec">
      <div class="r-sec-h">视觉谱系统计</div>
      <div class="stats-grid" id="sg"></div>
    </div>

    <div class="r-sec">
      <div class="r-sec-h">进阶路径：器材与策略</div>
      <div class="r-card"><p class="r-text" id="rgs"></p></div>
    </div>

    <div class="btn-group" style="padding-top:2rem;">
      <button class="btn-sub" onclick="location.href='index.html'" style="display:block; width:100%; padding:1rem; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--text); font-family:var(--sans); font-size:0.9rem; cursor:pointer; transition:all 0.3s ease;">返回首页</button>
    </div>
  </div>

  <script>
  const Q = [
  {c:"拍摄心理",t:"在拥挤的街道上，你最关注的是：",o:[{t:"人群中瞬间爆发出的情绪或动作",s:{S:2}},{t:"建筑与光影形成的几何结构",s:{C:2}},{t:"某种能触动内心怀旧感的气息",s:{P:2}},{t:"路人的时尚穿搭或肖像潜力",s:{G:1}}]},
  {c:"出片速度",t:"看到心仪的画面，你的通常反应是：",o:[{t:"本能地举机盲拍，不错过那一秒",s:{S:2}},{t:"先停下来构思最佳角度，即便可能错过",s:{C:2}},{t:"观察很久，确认那是“对的感觉”才动",s:{P:2,F:1}},{t:"确定参数到完美才按下快门",s:{G:2}}]},
  {c:"隐蔽性",t:"你希望自己在拍摄现场的状态是：",o:[{t:"隐形人，不惊动背景中的任何人",s:{S:2,F:1}},{t:"掌控者，指挥光影或模特到指定位置",s:{C:2}},{t:"体验者，与被摄对象共情",s:{P:2}},{t:"专家，所有数值都在掌握中",s:{G:2}}]},
  {c:"社交心态",t:"路人对你的镜头投来疑惑的目光，你会：",o:[{t:"报以微笑，然后迅速寻找下一个猎物",s:{S:2}},{t:"停下来解释自己的拍摄动机",s:{P:1}},{t:"感觉尴尬，立刻收起相机",s:{F:1}},{t:"无视他，专注于画面本身",s:{C:1}}]},
  {c:"突发状况",t:"相机突然卡壳，错过了一生一次的瞬间：",o:[{t:"沮丧但立刻寻找下一个补救机会",s:{S:1,L:1}},{t:"回家研究说明书，杜绝此类技术错误",s:{G:2}},{t:"觉得这就是天意，反而更有意义",s:{P:2,F:1}},{t:"这不可能发生，我一直有备用方案",s:{C:1}}]},
  {c:"构图首选",t:"你的取景器里最常出现的是：",o:[{t:"杂乱但富有生命力的生活碎片",s:{S:2}},{t:"绝对对称或大面积留白的极简",s:{C:2}},{t:"模糊、虚焦或充满颗粒的氛围",s:{P:2,F:1}},{t:"极致细腻的纹理与层次",s:{G:1,L:1}}]},
  {c:"器材重量",t:"你对器材重量的容忍度是：",o:[{t:"越轻越好，最好能塞进兜里",s:{S:2,P:1}},{t:"为了画质，负重30斤上山也行",s:{L:2,G:2}},{t:"必须要能挂在身前作为装饰",s:{F:1,C:1}},{t:"取决于今天的创作主题",s:{G:1}}]},

  // Geek / Tech (G) - 7 qs
  {c:"像素焦虑",t:"看到一张震撼的照片，你第一反应是：",o:[{t:"这情绪太到位了！",s:{P:2,S:1}},{t:"这画质真绝，什么镜头拍的？",s:{G:2}},{t:"光影处理得极其科学",s:{C:2}},{t:"这个构图太专业了",s:{C:1,L:1}}]},
  {c:"暗部细节",t:"一张过曝/欠曝的照片，在你看来的意义：",o:[{t:"不可饶恕的技术错误",s:{G:2,C:1}},{t:"表达真实感和RAW的原始魅力",s:{S:1,F:1}},{t:"只要意境在，技术不重要",s:{P:2}},{t:"后期动态范围够大就行",s:{G:1,L:1}}]},
  {c:"说明书",t:"买了一台新相机，你的阅读顺序是：",o:[{t:"从第一页完整看到最后一页",s:{G:2}},{t:"只看自己需要的那几个功能",s:{S:1,L:1}},{t:"基本不看，上手操作是最好的老师",s:{C:1}},{t:"拍照本身比机器更值得研究",s:{P:2}}]},
  {c:"版本帝",t:"厂商发布了新固件/新机身，你：",o:[{t:"凌晨两点看直播，第一时间下单",s:{G:2}},{t:"看看测评，觉得对出片没大帮助就不理",s:{C:2,L:1}},{t:"只要现在的机器能出片，永远不换",s:{F:2,P:1}},{t:"对此完全不感兴趣",s:{S:1}}]},
  {c:"测评心态",t:"你最常刷的内容是：",o:[{t:"各种大厂新机和昂贵镜头的测评",s:{G:2}},{t:"摄影大师的访谈和影集",s:{P:2,F:1}},{t:"修图教程与工作流优化",s:{C:2}},{t:"户外风光和绝佳机位分享",s:{L:2}}]},
  {c:"参数记忆",t:"你能随口说出你昨天拍的一张照片的参数吗？",o:[{t:"百分之百可以，包括对焦距离",s:{G:2}},{t:"大概记得，F几左右吧",s:{C:1,L:1}},{t:"完全不记得，感觉对了就按了",s:{P:2,F:1}},{t:"我只关心那一瞬间拍到了没",s:{S:2}}]},
  {c:"镜头偏好",t:"如果只能保留一支镜头，你会选：",o:[{t:"50mm F1.2 定焦，画质王者",s:{G:2,C:1}},{t:"35mm F2 挂机，随走随拍",s:{S:2,P:1}},{t:"24-70mm F2.8 全能战士",s:{L:2,C:1}},{t:"一支漏光的旧胶片变焦镜",s:{F:2,P:1}}]},

  // Landscape / Patience (L) - 7 qs
  {c:"早起习惯",t:"凌晨三点闹钟响了要去拍日出，你会：",o:[{t:"立刻起床，这光线等了一年",s:{L:2}},{t:"纠结半天，最后还是睡了",s:{P:1}},{t:"我更爱下午的柔光",s:{S:1,C:1}},{t:"如果有好器材在手，我可以去",s:{G:1}}]},
  {c:"孤独感",t:"一个人在荒野等了三小时没出好光，你觉得：",o:[{t:"这本身就是一种修行和宁静",s:{L:2,P:1}},{t:"极其浪费时间，以后要先看准确气象图",s:{G:1,C:1}},{t:"拍了一张背影发朋友圈，纪念这次失败",s:{S:1}},{t:"回想起前人的作品，思考自己差在哪",s:{C:2}}]},
  {c:"机位竞争",t:"到了机位发现有五个脚架在排队：",o:[{t:"默默找个没人发现的冷门视角",s:{L:2,S:1}},{t:"上去攀谈，看看对方用什么高级货",s:{G:2}},{t:"掉头就走，不喜欢重复别人",s:{C:2,P:1}},{t:"既然来了，就按常规角度拍几张",s:{P:1}}]},
  {c:"三脚架",t:"你如何看待三脚架？",o:[{t:"摄影师的另一条腿，必须带",s:{L:2,C:1}},{t:"沉重的枷锁，尽量不带",s:{S:2,P:1}},{t:"为了长曝光的纯净画质不得不带",s:{G:2,L:1}},{t:"我更喜欢手持快门的温度",s:{F:1}}]},
  {c:"风景VS人",t:"面对绝佳的风景，你会希望里面：",o:[{t:"一个人也没有，纯净的大自然",s:{L:2,C:1}},{t:"有一个孤独的背影作为点睛之笔",s:{P:2,S:1}},{t:"有自己的伴侣或朋友作为纪念",s:{G:1}},{t:"有路人甲来平衡画面比例",s:{S:1}}]},
  {c:"后期工作流",t:"后期修风景照时，你通常：",o:[{t:"追求极致的纯净度和层次，修三小时",s:{L:1,G:2,C:2}},{t:"稍微动下曲线，保留那时的感觉",s:{P:2,S:1}},{t:"必须调出某种独特的电影色调",s:{F:2,C:1}},{t:"我喜欢堆栈和包围曝光的合成感",s:{G:1,C:1}}]},
  {c:"旅行目的",t:"你旅行的真正目的是：",o:[{t:"带回来能印成大画册的照片",s:{L:2,C:1}},{t:"在过程中发现不一样的自己",s:{P:2}},{t:"享受在路上使用顶级器材的快感",s:{G:2}},{t:"去那些大师拍过的地方朝圣",s:{C:2,F:1}}]},

  // Craftsman / Perfection (C) - 7 qs
  {c:"细节控制",t:"画面边缘多出了一个垃圾桶：",o:[{t:"绝对不能忍，必须在构图阶段避开",s:{C:2,L:1}},{t:"这是生活的真实部分，留着也没事",s:{S:2,F:1}},{t:"后期涂抹掉就行了",s:{G:2,C:1}},{t:"只要视线被主体吸引，边缘不重要",s:{P:1}}]},
  {c:"商业接单",t:"面对不喜欢的拍摄要求，你会：",o:[{t:"按专业流程高标准完成，不带情绪",s:{C:2,G:1}},{t:"找理由拒绝，不能破坏自己的审美体系",s:{F:2,P:1}},{t:"虽然接了，但私下拍点自己喜欢的",s:{S:2}},{t:"先看报酬再决定投入程度",s:{L:1}}]},
  {c:"灯光运用",t:"对于人造光源，你的看法是：",o:[{t:"摄影是光的艺术，必须能精准控制",s:{C:2,G:2}},{t:"还是自然光有灵魂",s:{P:2,S:1}},{t:"掌握它太麻烦了",s:{F:1}},{t:"能不用就不用",s:{L:1}}]},
  {c:"排版美学",t:"你发一组照片到社交媒体，最看重：",o:[{t:"每一张的画质和细节均衡",s:{G:2}},{t:"九宫格之间的色调统一和节奏感",s:{C:2,F:1}},{t:"故事的起承转合",s:{P:2,S:1}},{t:"点赞数",s:{L:1}}]},
  {c:"自我评价",t:"你更愿意听到的评价是：",o:[{t:"这图修得太绝了，完全没痕迹",s:{C:2,G:1}},{t:"这张片子让我看哭了",s:{P:2,S:1}},{t:"这种视角除了你没人想得到",s:{F:2,C:1}},{t:"你这套器材真让人羡慕",s:{G:2}}]},
  {c:"色彩观念",t:"一张优秀的黑白照片：",o:[{t:"是关于影调层次和质感的极致博弈",s:{C:2,G:1,F:1}},{t:"抽离了色彩干扰，留下了灵魂",s:{P:2}},{t:"是街头摄影的遮羞布",s:{S:1}},{t:"不知道，我还是更爱彩色",s:{L:1}}]},
  {c:"长期计划",t:"关于“十年长线摄影项目”：",o:[{t:"我早就有计划，并且一直在规律执行",s:{C:2,L:2}},{t:"想过，但总觉得找不到开头的契机",s:{P:1,F:1}},{t:"摄影对我就是当下的一种发泄",s:{S:2}},{t:"到时候器材都更新换代了",s:{G:1}}]},

  // Poet / Emotion (P) - 6 qs
  {c:"快门重量",t:"你按下快门的一瞬间，这种感觉更像：",o:[{t:"一声沉重的叹息",s:{P:2,F:1}},{t:"一次完美的狙击",s:{S:2}},{t:"一次严谨的科学采样",s:{G:2}},{t:"一次机械的结构确认",s:{C:2}}]},
  {c:"胶片情怀",t:"由于过时或昂贵而放弃胶片的原因，在你看来：",o:[{t:"是人类审美上的巨大倒退",s:{F:2,P:1}},{t:"是技术发展的必然，数码更强",s:{G:2,C:1}},{t:"无所谓，只要能表达感情就行",s:{S:1,P:1}},{t:"没钱当然就不拍了",s:{L:1}}]},
  {c:"肖像灵魂",t:"拍人的时候，你会：",o:[{t:"通过沟通引导出对方内心最柔软的部分",s:{P:2}},{t:"只是把人作为构图里的一个符号",s:{C:2,L:1}},{t:"迅速捕捉其最具神采的瞬间",s:{S:2}},{t:"关注皮肤质感和眼神光的精确度",s:{G:2}}]},
  {c:"画质观念",t:"模糊、失焦、充满噪点的情况：",o:[{t:"有时候反而充满意境和诗意",s:{P:2,F:2}},{t:"绝对不能接受，必须重拍",s:{G:2,C:1}},{t:"那得看是故意为之还是水平不行",s:{C:2}},{t:"那是手机拍的吧？",s:{G:1}}]},
  {c:"灵感枯竭",t:"当你不想拿起相机时，通常是因为：",o:[{t:"内心干涸，没表达欲了",s:{P:2,F:1}},{t:"机器坏了或借给别人了",s:{G:1}},{t:"最近一直在拍同样的东西，有点腻",s:{C:2,L:1}},{t:"天气太差没好光",s:{L:2}}]},
  {c:"终极梦想",t:"你理想中的成名方式是：",o:[{t:"出一本跨越四十年的摄影诗集",s:{P:2,F:2,C:1}},{t:"在顶尖科学期刊发表光学测评",s:{G:2}},{t:"获得普利策新闻摄影奖",s:{S:2}},{t:"在国家地理杂志刊登独家封面",s:{L:2}}]},

  // Core Process & Logic - 16 qs
  {c:"纠错心态",t:"如果你是一串代码，你希望被存储在：",o:[{t:"一颗正在死去的恒星附近的硬盘里",s:{G:2}},{t:"深海两万里的光纤末端",s:{C:2}},{t:"蝴蝶振翅时产生的气流波动中",s:{P:2}},{t:"随机一个路人的短时记忆里",s:{S:2}}]},
  {c:"废片处理",t:"你如何处理废片？",o:[{t:"毫不留情地成批删除",s:{C:2,G:2}},{t:"留着它们，也许某天能发现不一样的美",s:{P:2,F:1}}]},
  {c:"后期频率",t:"关于后期调色，你：",o:[{t:"已经形成了固定的预设模式",s:{C:2,G:2}},{t:"每一张都根据那一刻的心情随兴调整",s:{P:2,S:1}}]},
  {c:"跨界美感",t:"如果不拍照，你会通过什么方式表达美感？",o:[{t:"绘画、诗歌或音乐",s:{P:2,F:1}},{t:"烹饪、装修或编写代码",s:{C:2,G:2}}]},
  {c:"同行评价",t:"看到同行拍了一张比你更好的同机位照片：",o:[{t:"仔细研究他的构图和参数，下回超越",s:{C:2,G:2}},{t:"感到欣慰，原来这地方能拍这么美",s:{P:2,S:1}}]},
  {c:"黑白魅力",t:"你觉得黑白摄影的魅力在于：",o:[{t:"光影对比的极致理性",s:{C:2,G:2}},{t:"剥离现实后的纯粹情感",s:{P:2,F:1}}]},
  {c:"隐秘创作",t:"当你背着相机走在街头，你感到：",o:[{t:"自己是一个隐形的记录者",s:{S:2,F:1}},{t:"自己是一个正在创作的艺术家",s:{P:2,C:2}}]},
  {c:"规则边界",t:"你会为了拍一张好照片而违反某些小规则（如进入禁止区域）吗？",o:[{t:"为了艺术，勇往直前",s:{S:2,L:2}},{t:"虽然眼馋，但准则更重要",s:{C:2,G:2,P:2}}]},
  {c:"噪点哲学",t:"你对“噪点”的看法是：",o:[{t:"数码时代的敌人",s:{G:2,C:2}},{t:"画面质感的一部分",s:{F:2,P:2}}]},
  {c:"操控光影",t:"你更喜欢哪种拍摄光线？",o:[{t:"人造光，可以完全掌控",s:{C:2,G:2}},{t:"自然光，接受大自然的随机赠礼",s:{L:2,P:2,S:2}}]},
  {c:"资产观念",t:"关于摄影器材的保值率：",o:[{t:"非常关心，每一步升级都经过算计",s:{G:2,C:2}},{t:"完全不在乎，它只是个耗材",s:{P:2,F:2,S:2}}]},
  {c:"纠错阈值",t:"会对自己的照片进行多少次修补？",o:[{t:"只要发现一点瑕疵就必须改",s:{C:2,G:2}},{t:"通常一次到位，保留真实感",s:{S:2,P:2}}]},
  {c:"语感认同",t:"如果有人说你的照片“很有意境”，你：",o:[{t:"感到受宠若惊，觉得被读懂了",s:{P:2,F:1}},{t:"想知道他具体指的是哪个构图点",s:{C:2,G:2}}]},
  {c:"视角选择",t:"你更喜欢：",o:[{t:"拍那些已经在摄影史上定格的经典",s:{L:2,C:1}},{t:"拍那些还没人关注的卑微角落",s:{S:2,P:2}}]},
  {c:"终极定义",t:"你觉得摄影是：",o:[{t:"将瞬间凝固成永恒的发现过程",s:{S:2,L:2}},{t:"在混乱世界中创造秩序的艺术过程",s:{C:2,P:2}}]},
  {c:"风景VS人",t:"面对绝佳的风景，你会希望里面：",o:[{t:"一个人也没有，纯净的大自然",s:{L:2,C:1}},{t:"有一个孤独的背影作为点睛之笔",s:{P:2,S:1}},{t:"有自己的伴侣或朋友作为纪念",s:{G:1}},{t:"有路人甲来平衡画面比例",s:{S:1}}]},
  {c:"后期工作流",t:"后期修风景照时，你通常：",o:[{t:"追求极致的纯净度和层次，修三小时",s:{L:1,G:2,C:2}},{t:"稍微动下曲线，保留那时的感觉",s:{P:2,S:1}},{t:"必须调出某种独特的电影色调",s:{F:2,C:1}},{t:"我喜欢堆栈和包围曝光的合成感",s:{G:1,C:1}}]},
  {c:"旅行目的",t:"你旅行的真正目的是：",o:[{t:"带回来能印成大画册的照片",s:{L:2,C:1}},{t:"在过程中发现不一样的自己",s:{P:2}},{t:"享受在路上使用顶级器材的快感",s:{G:2}},{t:"去那些大师拍过的地方朝圣",s:{C:2,F:1}}]},

  // Craftsman / Perfection (C) - 7 qs
  {c:"细节控制",t:"画面边缘多出了一个垃圾桶：",o:[{t:"绝对不能忍，必须在构图阶段避开",s:{C:2,L:1}},{t:"这是生活的真实部分，留着也没事",s:{S:2,F:1}},{t:"后期涂抹掉就行了",s:{G:2,C:1}},{t:"只要视线被主体吸引，边缘不重要",s:{P:1}}]},
  {c:"商业接单",t:"面对不喜欢的拍摄要求，你会：",o:[{t:"按专业流程高标准完成，不带情绪",s:{C:2,G:1}},{t:"找理由拒绝，不能破坏自己的审美体系",s:{F:2,P:1}},{t:"虽然接了，但私下拍点自己喜欢的",s:{S:2}},{t:"先看报酬再决定投入程度",s:{L:1}}]},
  {c:"灯光运用",t:"对于人造光源，你的看法是：",o:[{t:"摄影是光的艺术，必须能精准控制",s:{C:2,G:2}},{t:"还是自然光有灵魂",s:{P:2,S:1}},{t:"掌握它太麻烦了",s:{F:1}},{t:"能不用就不用",s:{L:1}}]},
  {c:"排版美学",t:"你发一组照片到社交媒体，最看重：",o:[{t:"每一张的画质和细节均衡",s:{G:2}},{t:"九宫格之间的色调统一和节奏感",s:{C:2,F:1}},{t:"故事的起承转合",s:{P:2,S:1}},{t:"点赞数",s:{L:1}}]},
  {c:"自我评价",t:"你更愿意听到的评价是：",o:[{t:"这图修得太绝了，完全没痕迹",s:{C:2,G:1}},{t:"这张片子让我看哭了",s:{P:2,S:1}},{t:"这种视角除了你没人想得到",s:{F:2,C:1}},{t:"你这套器材真让人羡慕",s:{G:2}}]},
  {c:"色彩观念",t:"一张优秀的黑白照片：",o:[{t:"是关于影调层次和质感的极致博弈",s:{C:2,G:1,F:1}},{t:"抽离了色彩干扰，留下了灵魂",s:{P:2}},{t:"是街头摄影的遮羞布",s:{S:1}},{t:"不知道，我还是更爱彩色",s:{L:1}}]},
  {c:"长期计划",t:"关于“十年长线摄影项目”：",o:[{t:"我早就有计划，并且一直在规律执行",s:{C:2,L:2}},{t:"想过，但总觉得找不到开头的契机",s:{P:1,F:1}},{t:"摄影对我就是当下的一种发泄",s:{S:2}},{t:"到时候器材都更新换代了",s:{G:1}}]},

  {c:"灵感枯竭",t:"当你不想拿起相机时，通常是因为：",o:[{t:"内心干涸，没表达欲了",s:{P:2,F:1}},{t:"机器坏了或借给别人了",s:{G:1}},{t:"最近一直在拍同样的东西，有点腻",s:{C:2,L:1}},{t:"天气太差没好光",s:{L:2}}]},

  // Final 6 to make 40
  {c:"社交圈",t:"你的摄影朋友们主要是：",o:[{t:"一群感性爱聊天的文青",s:{P:2,F:1}},{t:"整天研究跑分和防抖的技术大拿",s:{G:2}},{t:"在荒野里摸爬滚打的驴友",s:{L:2}},{t:"职业影楼或独立工作室的大咖",s:{C:2}}]},
  {c:"夜晚心态",t:"一个人带着相机走在午夜的街头：",o:[{t:"孤独而浪漫，灵感爆发期",s:{P:2,S:1}},{t:"感到不安，迅速拍完想拍的回房",s:{L:1}},{t:"这是测试相机高感光度和对焦的好机会",s:{G:2}},{t:"我更习惯有计划的灯光拍摄",s:{C:2}}]},
  {c:"存储空间",t:"面对满溢的硬盘：",o:[{t:"难受，每一张回忆都舍不得删",s:{P:2,F:1}},{t:"这周就开始深度整理，分类归档",s:{C:2,G:1}},{t:"只留那一两张出彩的，其他全格式化",s:{S:2,L:1}},{t:"再买一个更大更贵的阵列存储",s:{G:2}}]},

const T = {
  HUNTER: { icon: "🎯", eng: "THE HUNTER", zh: "街头猎人", pill: "纪实系 · 敏锐直觉", desc: "你是天生的快门捕手。在人群中，你的眼睛就像雷达一样不停扫视。<b>你拍的不是构图，而是那一秒钟的生命张力。</b>你的相机不是工具，而是身体的延伸。你对‘瞬间’的感知超过了对‘参数’的热情。摄影对你而言是一场永不停歇的狩猎，而那一张震撼灵魂的照片，就是你最好的勋章。", gs: "建议尝试更轻便的定焦镜头（如35mm/28mm），减少操作负荷。学习在街头与人进行‘非语言’的深度沟通，能让你的肖像更具温度。关注‘长期纪实’，不要只满足于单张的快感。" },
  GEEK: { icon: "🔬", eng: "THE GEEK", zh: "器材发烧友", pill: "技术系 · 百科全书", desc: "你对光学的热爱甚至超过了对取景框内容的关注。<b>你是摄影界的‘军械库大管家’。</b>即使是一张随手拍，你也要求技术上的绝对完美：焦点精准、宽容度极致、边缘画质扎实。你对每个时代的经典镜头了如指掌，是同行眼中行走的图书馆。毒舌一点说：你买的器材够开一个影展，但你的快乐往往在拿到新镜头的第一周。", gs: "别只顾着对对着墙壁测分辨率了！试着带着你最贵的那支镜头去一个从未去过的小镇。忘记MTF曲线，尝试在黄昏时分拍摄一些即使有眩光也动人的画面。好的画质只是画布，而你要画的是内容。" },
  POET: { icon: "🌿", eng: "THE POET", zh: "情绪诗人", pill: "人文系 · 灵魂底色", desc: "你拥有极度敏感的知觉，能捕捉到那些在空气中转瞬即逝的细微情绪。<b>你的照片是有味道和声音的。</b>你不太在意相机品牌，你在意的是光打在水面上的一瞬间，是否触动了你内心深处的记忆。摄影对你而言是一种替代性的语言，是一首写给时间的长诗。与其说你在记录世界，不如说你在记录此时此刻的自己。", gs: "保持这种敏感。尝试接触胶片摄影（如果经济允许），那种‘延迟满足’能让你对快门的敬畏感达到顶峰。建议多读文学作品，将文字的意境转化为视觉的留白。不要怕虚焦，有时候‘看不清’才是诗。" },
  CRAFTSMAN: { icon: "⚗️", eng: "THE CRAFTSMAN", zh: "完美主义匠人", pill: "商业系 · 精准执行", desc: "你对‘好照片’的定义是严苛且有标准的。<b>你像打磨钟表一样打磨你的每一张作品。</b>无论是灯位的角度还是后期像素级的修饰，都充满了你的控制欲。你是团队中最可靠的主心骨，因为你从不掉链子。你追求的不是‘意外的惊喜’，而是‘意料之中的伟大’。你的工作流是艺术与科学的高度结合。", gs: "你是职业化的巅峰。建议在空闲时间放下‘精密’，尝试用手机进行一次‘无目的’拍摄。接受一点混乱和不完美，也许能为你带来突破瓶颈的灵感。你可以尝试更有实验性质的灯光方案，打破你的固有逻辑。" },
  WANDERER: { icon: "🌊", eng: "THE WANDERER", zh: "漫游者", pill: "风光系 · 自然信徒", desc: "你与自然共生。<b>你愿意为了三十秒的极佳光线，在冰封的山巅等待一整晚。</b>你的镜头里充满了宏大的叙事感和对自然的敬畏。你追求极致的动态范围和画面纯度，因为你想让观者也感受到你在按下快门那一刻所感到的那种震撼、宁静与神性。你不仅是一个摄影师，更是一个伟大的自然观察者。", gs: "你需要一套极其可靠且防护性强的专业器材包（包括碳纤维脚架、高阶滤镜系统）。建议定期整理你的风光图库，尝试进行长跨度的‘自然变迁’项目，而不仅仅是打卡景点。学习地理和气象知识，会让你在‘等光’这件事上更具前瞻性。" },
  FILM: { icon: "🎞️", eng: "THE ARCHIVIST", zh: "胶片守护者", pill: "古典系 · 慢步调", desc: "在这个快餐式摄影的时代，你依然坚守着化学染料和银盐的浪漫。<b>你迷恋那种‘未知的确定性’。</b>每一张快门对你来说都是一次神圣的仪式。你对质感、颗粒和宽容度的理解带有古典主义的色彩。你相信真正的摄影是需要时间的沉淀和双手的参与的，电子感光元件永远无法取代这种‘有重量的色彩’。", gs: "如果还没尝试，建议玩玩大画幅或者湿版摄影，那会让你对‘什么是摄影’产生全新的理解。维护好你的防潮柜。建议在社交媒体分享时，多写一点冲洗和扫描的心得，那才是胶片党的独特魅力。别让胶片只停留在怀旧，尝试用它去拍非常前卫的主题。" }
};

let sc={S:0,G:0,L:0,C:0,P:0,F:0}, cur=0;

function start(){cur=0; sc={S:0,G:0,L:0,C:0,P:0,F:0}; show("sq"); render();}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function render(){
  const q=Q[cur];
  document.getElementById('pf').style.width=(cur/Q.length*100)+'%';
  document.getElementById('qc').textContent='第 '+(cur+1)+' / '+Q.length+' 题';
  document.getElementById('q-dim').textContent = q.c;
  document.getElementById('qt').textContent=q.t;
  const el=document.getElementById('qo'); el.innerHTML='';
  q.o.forEach(o=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=o.t;
    b.onclick=()=>{ Object.keys(o.s).forEach(k=>sc[k]+=o.s[k]); cur++; cur<Q.length?render():finish(); };
    el.appendChild(b);
  });
}

function finish(){
  show("sl");
  const ss = ["正在解析拍摄习惯模型...","正在匹配全球创作者指纹...","正在评估器材亲和力...","最终报告生成中..."];
  let i=0;
  const timer = setInterval(()=>{
    document.getElementById('ls').textContent = ss[i++];
    if(i>=ss.length){ clearInterval(timer); setTimeout(showResult, 600); }
  }, 700);
}

function showResult(){
  const sorted = Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const k = sorted[0][0];
  const map = {S:'HUNTER', G:'GEEK', P:'POET', C:'CRAFTSMAN', L:'WANDERER', F:'FILM'};
  const res = T[map[k]];
  
  document.getElementById('ri').textContent=res.icon;
  document.getElementById('re').textContent=res.eng;
  document.getElementById('rz').textContent=res.zh;
  document.getElementById('rp').textContent=res.pill;
  document.getElementById('rd').innerHTML=res.desc;
  document.getElementById('rgs').innerHTML=res.gs;

  const sgg = document.getElementById('sg'); sgg.innerHTML='';
  const labels = {S:'抓拍力', G:'技术力', L:'意志力', C:'执行力', P:'共情力', F:'古典力'};
  sorted.slice(0, 4).forEach(([kk,vv])=>{
    sgg.innerHTML += `<div class="stat-i"><div class="stat-l">${labels[kk]}</div><div class="stat-v">${vv} 分</div></div>`;
  });

  show("sr");
}

function toast(m){
  const t=document.getElementById('toast'); t.textContent=m; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0', 3000);
}

function exportCard(){
  const sorted = Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const k = sorted[0][0];
  const map = {S:'HUNTER', G:'GEEK', P:'POET', C:'CRAFTSMAN', L:'WANDERER', F:'FILM'};
  const res = T[map[k]];
  
  const container=document.getElementById('export-container');
  container.innerHTML=`<div class="exp-card" id="card">
    <div style="font-size:10px; opacity:0.6; margin-bottom:10px;">PBTI PROFESSIONAL REPORT</div>
    <div class="exp-logo">PBTI</div>
    <div class="exp-res">${res.eng}</div>
    <div style="font-size:24px; font-weight:600; color:#9a7a45; margin-bottom:15px;">${res.zh}</div>
    <div style="font-size:13px; letter-spacing:1px; background:#1a1a1a; color:#fff; display:inline-block; padding:4px 12px; border-radius:30px;">${res.pill}</div>
    <div class="exp-desc">“${res.desc.replace(/<[^>]*>/g, '').substring(0, 120)}...”</div>
    <div style="font-size:11px; color:#888; border-top:1px solid #ddd; padding-top:20px; display:flex; justify-content:space-between;">
      <span>© 2026 Discovery Hub Premium</span>
      <span>#PBTI摄影人格</span>
    </div>
  </div>`;
  
  toast('正在为您定影专业报告卡...');
  setTimeout(()=>{
    html2canvas(document.getElementById('card'),{scale:2,backgroundColor:'#f7f4ee'}).then(canvas=>{
      const link=document.createElement('a'); link.download=`PBTI_Report_${res.eng}.png`;
      link.href=canvas.toDataURL(); link.click();
      toast('✨ 报告已下载！');
    });
  },200);
}
</script>
