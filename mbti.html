<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MBTI 16型人格专业测评报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --paper:#f5f4f0; --ink:#1a1a1a; --muted:#8a8478; --accent:#c8a96e; --border:#e8e6e0;
  --serif:'DM Serif Display', serif; --sans:'DM Sans', sans-serif;
  --bg-gradient: radial-gradient(circle at top right, #fff, #f5f4f0);
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{
  background:var(--paper); color:var(--ink); font-family:var(--sans);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
}
#app{ width:100%; max-width:540px; padding:1.5rem 1.25rem 4rem; position:relative; }
.screen{display:none; animation:fadeIn 0.5s ease-out;}
.screen.active{display:block}
@keyframes fadeIn{ from{opacity:0; transform:translateY(15px)} to{opacity:1; transform:translateY(0)} }

/* Start Screen */
.header{text-align:center; padding:2rem 0 1.5rem;}
.logo-box{position:relative; display:inline-block; margin-bottom:1rem;}
.logo{font-family:var(--serif); font-size:4.5rem; line-height:1; letter-spacing:-3px;}
.premium-tag{
  position:absolute; top:-10px; right:-20px; background:var(--accent); color:#fff;
  font-size:10px; padding:2px 8px; border-radius:20px; font-weight:600; text-transform:uppercase;
}
.sub{font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:0.5rem;}
.intro{
  font-size:14px; line-height:1.75; color:#555; margin-bottom:2.5rem; text-align:center; font-weight:300;
  max-width:400px; margin-left:auto; margin-right:auto;
}
.feature-list{display:flex; flex-direction:column; gap:12px; margin-bottom:3rem; }
.feature-item{display:flex; align-items:flex-start; gap:10px; font-size:13px; color:var(--muted);}
.feature-item span{color:var(--accent); font-weight:bold;}

.btn-main{
  display:block; width:100%; padding:18px; background:var(--ink); color:#fff; border:none;
  border-radius:2px; font-size:16px; font-weight:500; cursor:pointer; transition:all 0.3s;
  letter-spacing:1px;
}
.btn-main:active{transform:scale(0.98); opacity:0.9;}

/* Test Screen */
.prog-container{margin-bottom:2.5rem; position:sticky; top:1rem; background:rgba(245,244,240,0.9); backdrop-filter:blur(8px); padding:0.5rem 0; z-index:10;}
.prog-bar{height:2px; background:var(--border); border-radius:2px; overflow:hidden;}
.prog-fill{height:100%; background:var(--ink); transition:width 0.3s ease;}
.q-meta{display:flex; justify-content:space-between; margin-bottom:0.5rem; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;}

.q-text{font-family:var(--serif); font-size:1.6rem; line-height:1.4; margin-bottom:2.5rem; letter-spacing:-0.5px;}
.opts{display:flex; flex-direction:column; gap:12px;}
.opt-btn{
  padding:20px; border:1px solid var(--border); border-radius:4px; background:#fff;
  text-align:left; font-size:15px; cursor:pointer; transition:all 0.2s; line-height:1.5;
  color:#333; font-weight:300;
}
.opt-btn:active{background:var(--paper); border-color:var(--muted);}

/* Loading Screen */
.loader-box{text-align:center; padding:6rem 0;}
.spinner{
  width:40px; height:40px; border:1px solid var(--border); border-top-color:var(--ink);
  border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 2rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-family:var(--serif); font-size:1.5rem; margin-bottom:1rem;}
.loader-sub{font-size:13px; color:var(--muted); animation:pulse 2s infinite;}
@keyframes pulse{ 0%,100%{opacity:0.5} 50%{opacity:1} }

/* Result Screen */
.res-header{text-align:center; margin-bottom:3rem; padding-bottom:2rem; border-bottom:1px solid var(--border);}
.res-type{font-family:var(--serif); font-size:6rem; line-height:1; letter-spacing:-4px; margin-bottom:0.5rem;}
.res-name{font-size:22px; font-weight:600; color:var(--accent); margin-bottom:1.5rem; display:flex; align-items:center; justify-content:center; gap:10px;}
.res-name::before, .res-name::after{content:''; height:1px; width:40px; background:var(--border);}

.res-section{margin-bottom:2.5rem;}
.section-title{font-size:10px; text-transform:uppercase; letter-spacing:3px; color:var(--muted); margin-bottom:1.25rem; font-weight:600; display:flex; align-items:center; gap:10px;}
.section-title::after{content:''; flex:1; height:1px; background:var(--border);}

.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:2rem;}
.stat-item{background:#fff; border:1px solid var(--border); padding:15px; border-radius:4px;}
.stat-label{font-size:10px; color:var(--muted); margin-bottom:8px; text-transform:uppercase;}
.stat-bar-bg{height:4px; background:var(--paper); border-radius:2px; overflow:hidden;}
.stat-bar-fill{height:100%; background:var(--ink); transition:width 1s ease-out;}
.stat-info{display:flex; justify-content:space-between; margin-top:8px; font-size:12px; font-weight:500;}

.profile-card{background:#fff; border:1px solid var(--border); padding:2rem; border-radius:4px; margin-bottom:2rem;}
.profile-text{font-size:15px; line-height:1.9; color:#444; font-weight:300;}
.profile-text b{color:var(--ink); font-weight:600;}

.bullet-list{list-style:none;}
.bullet-item{margin-bottom:12px; position:relative; padding-left:25px; font-size:14px; line-height:1.7; color:#555;}
.bullet-item::before{content:'•'; position:absolute; left:0; color:var(--accent); font-size:20px; line-height:1;}

.btn-group{margin-top:4rem; display:flex; flex-direction:column; gap:12px;}
.btn-outline{
  display:block; width:100%; padding:16px; background:transparent; border:1px solid var(--border);
  border-radius:2px; font-size:15px; cursor:pointer; text-align:center; color:var(--ink);
}

/* Share Toast */
.share-msg{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 24px; border-radius:30px; font-size:12px; opacity:0; transition:opacity 0.3s; z-index:1000; white-space:nowrap;}

/* Export Styling */
#export-container{position:absolute; left:-9999px; top:0;}
.exp-card{
  width:500px; padding:60px; background:var(--paper); color:var(--ink); font-family:var(--sans);
  border:1px solid #ddd; position:relative;
}
.exp-type{font-family:var(--serif); font-size:100px; letter-spacing:-6px; line-height:0.8; margin-bottom:15px;}
.exp-name{font-size:32px; font-weight:600; margin-bottom:40px; color:var(--accent);}
.exp-summary{font-size:18px; line-height:1.8; color:#333; margin-bottom:50px; border-top:2px solid var(--ink); padding-top:30px;}
.exp-foot{font-size:12px; color:var(--muted); display:flex; justify-content:space-between;}
</style>
</head>
<body>
<div id="app">
  <!-- START SCREEN -->
  <div id="sc-start" class="screen active">
    <div class="header">
      <div class="logo-box">
        <div class="logo">MBTI</div>
        <div class="premium-tag">Professional</div>
      </div>
      <div class="sub">Archetype Discovery Report</div>
    </div>
    <p class="intro">
      这不仅仅是一个测试。这是通往深度自我的入场券。通过 44 个核心维度，我们为您绘制一份关于性格、职业、人际关系的完整蓝图。
    </p>
    <div class="feature-list">
      <div class="feature-item"><span>+</span> 44个核心深度测试维度</div>
      <div class="feature-item"><span>+</span> 16种人格深度解析报告</div>
      <div class="feature-item"><span>+</span> 职业倾向与职场优势分析</div>
      <div class="feature-item"><span>+</span> 人际交往与伴侣匹配建议</div>
    </div>
    <button class="btn-main" onclick="start()">开启专业测评 →</button>
  </div>

  <!-- TEST SCREEN -->
  <div id="sc-test" class="screen">
    <div class="prog-container">
      <div class="q-meta">
        <span id="q-cat">Dimension Exploration</span>
        <span id="qc">1 / 44</span>
      </div>
      <div class="prog-bar"><div id="fill" class="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="q-text" id="qt"></div>
    <div class="opts" id="qo"></div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="sc-load" class="screen">
    <div class="loader-box">
      <div class="spinner"></div>
      <div class="loader-text">分析中...</div>
      <div id="loader-status" class="loader-sub">正在匹配人格模型曲线</div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="sc-res" class="screen">
    <div class="res-header">
      <div class="res-type" id="res-type"></div>
      <div class="res-name" id="res-name"></div>
      <div class="sub">人格深度分析报告</div>
    </div>

    <div class="res-section">
      <div class="section-title">人格维分统计</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <div class="res-section">
      <div class="section-title">核心肖像</div>
      <div class="profile-card">
        <p class="profile-text" id="res-desc"></p>
      </div>
    </div>

    <div class="res-section">
      <div class="section-title">职场竞争力</div>
      <ul class="bullet-list" id="res-career"></ul>
    </div>

    <div class="res-section">
      <div class="section-title">人际与情感</div>
      <p class="profile-text" id="res-social"></p>
    </div>

    <div class="res-section">
      <div class="section-title">进化策略</div>
      <ul class="bullet-list" id="res-growth"></ul>
    </div>
    
    <div class="btn-group" style="padding: 2rem 0; display: grid; gap: 1rem;">
      <button class="btn-main" onclick="exportCard()">保存完整性格报告卡 💍</button>
      <button class="btn-sub" onclick="location.reload()" style="background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.8rem; border-radius: 10px; cursor: pointer;">重新测试</button>
    </div>
  </div>

  <script>
  const Q = [
    // E-I (1-16)
  {t:"在繁忙的街道上，你更倾向于：",o:[{t:"观察周围的人和事",s:"E"},{t:"沉浸在自己的思考中",s:"I"}]},
  {t:"你更喜欢在团队中头脑风暴，还是独自构思方案？",o:[{t:"集体讨论",s:"E"},{t:"独自思考",s:"I"}]},
  {t:"遇到好消息，你的第一反应通常是：",o:[{t:"找人分享",s:"E"},{t:"先自己消化喜悦",s:"I"}]},
  {t:"社交活动后，你感到：",o:[{t:"精神焕发",s:"E"},{t:"疲惫多于愉悦",s:"I"}]},
  {t:"在聚会上，你通常：",o:[{t:"主动介绍自己给陌生人",s:"E"},{t:"留在熟人圈子里",s:"I"}]},
  {t:"你认为自己在表达想法时：",o:[{t:"边想边说",s:"E"},{t:"想好了再说",s:"I"}]},
  {t:"面对陌生环境，你往往：",o:[{t:"迅速适应并寻找互动",s:"E"},{t:"先在旁观察很久",s:"I"}]},
  {t:"你更喜欢在什么样的环境下工作？",o:[{t:"热闹、多互动的开放空间",s:"E"},{t:"安宁、独立的私人角落",s:"I"}]},
  {t:"当你感到压力时，你更倾向于：",o:[{t:"通过与他人沟通获得慰藉",s:"E"},{t:"需要空间让自己静下心来",s:"I"}]},
  {t:"你更喜欢哪种类型的周末？",o:[{t:"和朋友们排满活动",s:"E"},{t:"独自在家自由安排",s:"I"}]},
  {t:"你常常觉得：",o:[{t:"安静太久让你感到不安",s:"E"},{t:"喧闹太久让你感到崩溃",s:"I"}]},
  {t:"独自在咖啡馆时，你倾向于：",o:[{t:"观察周围的人并享受这种氛围",s:"E"},{t:"沉浸在自己的书或手机里",s:"I"}]},
  {t:"面对一个并不熟悉但很热闹的邀请，你通常：",o:[{t:"觉得是结交新朋友的机会",s:"E"},{t:"觉得这是一种社交负担",s:"I"}]},
  {t:"在团队讨论中，你通常是：",o:[{t:"活跃的参与者，有很多想法要说",s:"E"},{t:"深思熟虑的倾听者，较少发言",s:"I"}]},
  {t:"你的朋友们通常觉得你：",o:[{t:"很好接近，总是充满活力",s:"E"},{t:"有些神秘感，需要深交才能了解",s:"I"}]},
  {t:"如果要在“热闹的露天夜市”和“安静的私人影院”二选一：",o:[{t:"露天夜市",s:"E"},{t:"私人影院",s:"I"}]},

  // S-N (17-32)
  {t:"你更相信自己的：",o:[{t:"实际经验",s:"S"},{t:"直觉灵感",s:"N"}]},
  {t:"描述一件往事时，你更倾向于：",o:[{t:"描述具体细节和事实",s:"S"},{t:"传达那一刻的整体感觉",s:"N"}]},
  {t:"学习新概念时，你喜欢：",o:[{t:"先看具体实例",s:"S"},{t:"先理解背后的理论脉络",s:"N"}]},
  {t:"你更关注当前的：",o:[{t:"现在",s:"S"},{t:"未来",s:"N"}]},
  {t:"面对问题，你更倾向于用：",o:[{t:"标准的方法",s:"S"},{t:"创新的新思路",s:"N"}]},
  {t:"别人通常评价你更有：",o:[{t:"踏实感（实干派）",s:"S"},{t:"洞察力（精神派）",s:"N"}]},
  {t:"你更喜欢阅读：",o:[{t:"写实的、基于事实的文字",s:"S"},{t:"充满隐喻和抽象思考的文字",s:"N"}]},
  {t:"在工作中，你更看重：",o:[{t:"具体的结果和数据",s:"S"},{t:"项目潜力和长远规划",s:"N"}]},
  {t:"你更擅长：",o:[{t:"完善现有的系统",s:"S"},{t:"构思一个全新的框架",s:"N"}]},
  {t:"你容易被什么样的谈话吸引？",o:[{t:"关于日常生活和经历的",s:"S"},{t:"关于想法、意义或可能性的",s:"N"}]},
  {t:"如果只能二选一，你认为自己：",o:[{t:"更实际",s:"S"},{t:"更深邃",s:"N"}]},
  {t:"关于理财，你更看重：",o:[{t:"确定的利率和即时的收益",s:"S"},{t:"长远的趋势和潜在的投资逻辑",s:"N"}]},
  {t:"你认为“脚踏实地”：",o:[{t:"是人生成功的根本保障",s:"S"},{t:"有时会限制人的视野与创造力",s:"N"}]},
  {t:"描述一朵花，你会谈论：",o:[{t:"花瓣的数量颜色与品种",s:"S"},{t:"它代表的生命力与意境",s:"N"}]},
  {t:"你觉得一个好的点子应该是：",o:[{t:"能立刻落地执行的",s:"S"},{t:"能带来全新可能性的",s:"N"}]},
  {t:"相对于“细节”，你对“大框架”：",o:[{t:"感到有些力不从心",s:"S"},{t:"感到浑身充满力量",s:"N"}]},

  // T-F (33-48)
  {t:"当朋友遇到困境，你首先提供：",o:[{t:"逻辑上的解决方案",s:"T"},{t:"情感上的共振与支持",s:"F"}]},
  {t:"你认为原则和公正：",o:[{t:"永远排在第一位",s:"T"},{t:"有时应为仁慈让步",s:"F"}]},
  {t:"在决策时，你更倾向于：",o:[{t:"客观地分析利弊",s:"T"},{t:"跟随内心的价值观感",s:"F"}]},
  {t:"你更在意：",o:[{t:"真理本身",s:"T"},{t:"和谐的关系",s:"F"}]},
  {t:"当你批评别人时，你通常：",o:[{t:"直接且明确",s:"T"},{t:"委婉且顾虑颜面",s:"F"}]},
  {t:"你更倾向于指出别人的：",o:[{t:"逻辑漏洞",s:"T"},{t:"美好初衷",s:"F"}]},

  {t:"面对不愉快的事情，你习惯：",o:[{t:"迅速将其剥离并寻找原因",s:"T"},{t:"陷入其中并自我消化情绪",s:"F"}]},
  {t:"你认为成功主要靠：",o:[{t:"头脑和意志",s:"T"},{t:"沟通和协作",s:"F"}]},
  {t:"在一段关系中，最不可接受的是：",o:[{t:"无脑和混乱",s:"T"},{t:"冷漠和疏离",s:"F"}]},
  {t:"如果你是法官，你认为：",o:[{t:"法律必须被严格执行",s:"T"},{t:"法律应当考虑到具体的人情",s:"F"}]},
  {t:"你更喜欢哪种赞美？",o:[{t:"“你真有本事，工作很出色”",s:"T"},{t:"“你人真好，大家都很爱你”",s:"F"}]},
  {t:"面对重大决策，你通常：",o:[{t:"列出利弊清单进行客观权衡",s:"T"},{t:"顺从直觉带来的‘舒适感’",s:"F"}]},
  {t:"你如何看待‘妥协’？",o:[{t:"为了效率有时不得不为之",s:"T"},{t:"为了和谐应当经常尝试",s:"F"}]},
  {t:"在团队中，你更怕碰到：",o:[{t:"效率极低但人很好的伙伴",s:"T"},{t:"能力极强但嘴很毒的伙伴",s:"F"}]},

  // J-P (49-64)
  {t:"你喜欢把行程排满，还是留白？",o:[{t:"排满，这样更有控制感",s:"J"},{t:"留白，以便灵活调整",s:"P"}]},
  {t:"对于截止日期，你通常：",o:[{t:"提前完成",s:"J"},{t:"卡点爆发",s:"P"}]},

  {t:"你更喜欢哪种工作状态？",o:[{t:"目标明确，按部就班",s:"J"},{t:"边做边看，寻找新可能",s:"P"}]},
  {t:"你的桌面/由于整理习惯往往：",o:[{t:"整齐有序，知道位置",s:"J"},{t:"有点乱，但很有生命力",s:"P"}]},
  {t:"你买东西前通常：",o:[{t:"做足功课，清单采购",s:"J"},{t:"随性挑选，看中心动",s:"P"}]},
  {t:"你认为生活应当是：",o:[{t:"一系列有计划的成就",s:"J"},{t:"一场没有终点的奇遇",s:"P"}]},
  {t:"面对新任务时，你更倾向于：",o:[{t:"先列出详细步骤",s:"J"},{t:"立刻跳进去上手尝试",s:"P"}]},
  {t:"你认为“完成”一件事意味着：",o:[{t:"如期收尾",s:"J"},{t:"做到了最好的程度",s:"P"}]},

  {t:"你如何看待这种说法：“计划赶不上变化”？",o:[{t:"所以更要精密的计划",s:"J"},{t:"所以计划通常是浪费时间",s:"P"}]},
  {t:"你的手机相册通常：",o:[{t:"精心分类和整理过",s:"J"},{t:"杂乱无章，没时间整理",s:"P"}]},
  {t:"如果出门发现忘了带一样非必需品，你会：",o:[{t:"感到不自在，计划被打乱了",s:"J"},{t:"觉得这没关系，随机应变",s:"P"}]},

let cur=0, sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}, resKey="";

function start(){cur=0; sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}; show("sc-test"); render();}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

const CAT_LABELS = {
  0: "社交与能量倾向 (E/I)",
  11: "信息采集与感知 (S/N)",
  22: "决策与逻辑判断 (T/F)",
  33: "生活方式与组织 (J/P)"
};

function render(){
  const q=Q[cur]; 
  document.getElementById('fill').style.width=(cur/Q.length*100)+'%';
  document.getElementById('qc').textContent='第 '+(cur+1)+' / '+Q.length+' 题';
  document.getElementById('qt').textContent=q.t;
  
  // Set Category Label
  let label = "Dimension Exploration";
  if(cur<11) label=CAT_LABELS[0];
  else if(cur<22) label=CAT_LABELS[11];
  else if(cur<33) label=CAT_LABELS[22];
  else label=CAT_LABELS[33];
  document.getElementById('q-cat').textContent=label;

  const el=document.getElementById('qo'); el.innerHTML='';
  q.o.forEach(o=>{
    const b=document.createElement('button'); b.className='opt-btn'; b.textContent=o.t;
    b.onclick=()=>{ sc[o.s]++; cur++; cur<Q.length?render():finish(); }; el.appendChild(b);
  });
}

function finish(){
  show("sc-load");
  const statuses = ["正在校准性格维分曲线...","正在匹配全球数据库...","生成多维心理肖像中...","正在构建职业建议模型..."];
  let i=0;
  const interval = setInterval(()=>{
    document.getElementById('loader-status').textContent = statuses[i++];
    if(i>=statuses.length){
      clearInterval(interval);
      setTimeout(showResult, 800);
    }
  }, 700);
}

  const growthList = document.getElementById('res-growth');

  const pairs = [['E','I','能量来源'],['S','N','信息采集'],['T','F','决策机制'],['J','P','生活组织']];
  pairs.forEach(p=>{
    const total = sc[p[0]]+sc[p[1]];
    const pct = Math.round((sc[p[0]]/total)*100);
    sg.innerHTML += `
      <div class="stat-item">
        <div class="stat-label">${p[2]}</div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
        <div class="stat-info"><span>${p[0]} ${pct}%</span><span>${100-pct}% ${p[1]}</span></div>
      </div>
    `;
  });

  show("sc-res");
}

function toast(msg){
  const t = document.getElementById('share-toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(()=>t.style.opacity='0', 3000);
}

function exportCard(){
  const d = DATA[resKey];
  const container=document.getElementById('export-container');
  container.innerHTML=`<div class="exp-card" id="card">
    <div style="font-size:10px; letter-spacing:3px; color:#888; text-transform:uppercase; margin-bottom:20px;">Discovery Hub · Archive No. ${Math.floor(Math.random()*100000)}</div>
    <div class="exp-type">${resKey}</div>
    <div class="exp-name">${d.n}</div>
    <div class="exp-summary"><b>人格简述：</b>${d.d.replace(/<[^>]*>/g, '').substring(0, 150)}...</div>
    <div class="exp-foot">
      <div>#MBTI #PsychologyProfile</div>
      <div>© 2026 Discovery Hub Premium</div>
    </div>
  </div>`;
  
  toast('正在生成专业版性格档案...');
  setTimeout(()=>{
    html2canvas(document.getElementById('card'),{scale:2,backgroundColor:'#f5f4f0'}).then(canvas=>{
      const link=document.createElement('a'); link.download=`MBTI_Report_${resKey}.png`;
      link.href=canvas.toDataURL(); link.click();
      toast('✨ 报告卡片已下载！');
    });
  },200);
}
</script>
